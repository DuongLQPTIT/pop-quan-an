<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEMO</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* ===== BACKGROUND ĐỘNG ===== */
body {
    font-family: Arial;
    color: black;

    background: linear-gradient(-45deg, #ff6b6b, #6bffb8, #6bc1ff, #d96bff);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;

    transition: 0.3s;
}

body.dark {
    background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #000000);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    color: white;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ===== HEADER ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    border-bottom: 1px solid #ddd;
    position: relative;
}

.left, .right {
    display: flex;
    align-items: center;
    gap: 15px;
}

.icon {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #f2f2f2;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

body.dark .icon {
    background: #2a2a2a;
}

.icon img {
    width: 20px;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.logo {
    height: 40px;
}

/* ===== MENU TOP ===== */
.top-menu {
    display: flex;
    gap: 8px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    background: #f3f4f6;
    padding: 6px 12px;
    border-radius: 12px;
}

body.dark .top-menu {
    background: #2a2a2a;
}

.top-menu-item {
    text-decoration: none;
    color: #374151;
    padding: 6px 12px;
    border-radius: 8px;
}

.top-menu-item:hover {
    background: #e5e7eb;
}

.top-menu-item.active {
    background: white;
    font-weight: 600;
}

/* ===== MAIN ===== */
.main-container {
    width: 95%;
    margin: 20px auto;
}

.sidebar {
    vertical-align: top;
    padding: 20px;
    background-color: #f9f9f9;
}

.content-area {
    vertical-align: top;
    padding: 20px;
}

/* ===== GRID ===== */
.article-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.article-card {
    border-bottom: 1px solid #eee;
    padding-bottom: 15px;
    overflow: hidden;
}

/* ===== FIX ẢNH ===== */
.img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}

/* TEXT */
.article-title {
    margin: 10px 0;
    font-size: 1.1em;
}

.article-desc {
    font-size: 0.9em;
    color: gray;
}

/* BUTTON */
.btn-more {
    display: inline-block;
    padding: 6px 12px;
    background: #00aeef;
    color: white;
    border-radius: 5px;
    text-decoration: none;
}

</style>
</head>

<body>

<header>
<div class="header">

<div class="left">
    <img class="logo" src="https://i.pinimg.com/1200x/4b/6b/aa/4b6baaa79ae9010a740249b998c3587b.jpg">
</div>

<div class="right">
    <div class="icon" onclick="toggleDark()">
        <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">
    </div>
    <img class="avatar" src="https://i.pravatar.cc/100">
</div>

<div class="top-menu">
    <a href="#" class="top-menu-item active">POS</a>
    <a href="#" class="top-menu-item active ">Bàn</a>
    <a href="#" class="top-menu-item active">Đồ uống </a>
    <a href="#" class="top-menu-item active">Món tráng miệng</a>
</div>

</div>
</header>

<main>
<table class="main-container">
<tr>

<td class="content-area">

<h4>Danh mục</h4>
<ul>
<li>Có Rau</li>
<li>Không Rau</li>
<li>Trứng</li>
<li>Khác</li>
</ul>

<h2>🔥 BEST SELLER 🔥</h2>

<div class="article-grid">

<div class="article-card">
<img src="https://kinhdoamthuc.com/wp-content/uploads/2023/07/bun-bo-hue-1_1628650972.jpg" class="img">
<h4 class="article-title">BÚN BÒ HUẾ</h4>
<p class="article-desc">69.000VND</p>
<a href="#" class="btn-more">THÊM MÓN</a>
</div>

<div class="article-card">
<img src="https://cafefcdn.com/203337114487263232/2022/12/7/photo-9-1670398141900764774990.jpg" class="img">
<h4 class="article-title">CƠM TẤM</h4>
<p class="article-desc">69.000VND</p>
<a href="#" class="btn-more">THÊM MÓN</a>
</div>

<div class="article-card">
<img src="https://static.vinwonders.com/production/optimize_pho-ha-noi-2.jpg" class="img">
<h4 class="article-title">PHỞ HÀ NỘI</h4>
<p class="article-desc">59.000VND</p>
<a href="#" class="btn-more">THÊM MÓN</a>
</div>

<div class="article-card">
<img src="https://i-giadinh.vnecdn.net/2025/05/16/Bun-dau-mam-tom-6-vnexpress-17-9082-8722-1747388531.jpg" class="img">
<h4 class="article-title">BÚN ĐẬU MẮM TÔM</h4>
<p class="article-desc">59.000VND</p>

</div>

</td>

<td class="sidebar" style="width:25%">
<h4>NEW FOODS</h4>

</ul>
</td>

</tr>
</table>
</main>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
